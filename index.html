<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>리더십 아카데미</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0a0e1a;
    --bg-card: rgba(255,255,255,0.04);
    --bg-card-hover: rgba(255,255,255,0.08);
    --gold: #c9a84c;
    --gold-light: #e8d48b;
    --gold-dim: rgba(201,168,76,0.15);
    --text-main: #e8e4dc;
    --text-dim: #8a8678;
    --text-bright: #fff;
    --accent-blue: #4a7c9b;
    --border: rgba(201,168,76,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg-deep);
    color: var(--text-main);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Atmospheric background */
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(74,124,155,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(10,14,26,1) 0%, rgba(10,14,26,1) 100%);
    z-index: -1;
    animation: drift 30s ease-in-out infinite alternate;
  }

  @keyframes drift {
    0% { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(-2%, -1%) rotate(1deg); }
  }

  /* Top Nav */
  .top-nav {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.1s;
  }

  .top-nav a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--gold);
    text-decoration: none;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    transition: color 0.3s ease;
  }

  .top-nav a:hover {
    color: var(--gold-light);
  }

  .top-nav a svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
  }

  /* Hero Section */
  .hero {
    text-align: center;
    padding: 40px 24px 28px;
    position: relative;
  }

  .hero-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid var(--border);
    padding: 6px 20px;
    border-radius: 100px;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.2s;
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 700;
    color: var(--text-bright);
    line-height: 1.3;
    margin-bottom: 6px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.4s;
  }

  .hero h1 span {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-sub {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 300;
    max-width: 360px;
    margin: 12px auto 0;
    line-height: 1.7;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.6s;
  }

  .hero-line {
    width: 50px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto 0;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.7s;
  }

  /* Quote */
  .quote-section {
    text-align: center;
    padding: 20px 28px 8px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.8s;
  }

  .quote-text {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-style: italic;
    color: var(--gold-light);
    line-height: 1.8;
    max-width: 400px;
    margin: 0 auto;
    position: relative;
  }

  .quote-text::before {
    content: '\201C';
    font-size: 40px;
    color: rgba(201,168,76,0.3);
    position: absolute;
    top: -16px;
    left: -8px;
    font-family: 'Playfair Display', serif;
  }

  .quote-author {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 10px;
    letter-spacing: 1px;
  }

  /* Certificate Notice */
  .cert-notice {
    text-align: center;
    padding: 16px 28px 8px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.9s;
  }

  .cert-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, rgba(201,168,76,0.1), rgba(201,168,76,0.05));
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 12px;
    padding: 12px 20px;
    max-width: 400px;
  }

  .cert-badge svg {
    width: 20px;
    height: 20px;
    fill: var(--gold);
    flex-shrink: 0;
  }

  .cert-badge p {
    font-size: 12px;
    color: var(--text-main);
    line-height: 1.6;
    text-align: left;
  }

  .cert-badge p strong {
    color: var(--gold);
  }

  /* Stats bar */
  .stats {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 24px 20px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1.0s;
  }

  .stat-item {
    text-align: center;
  }

  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--gold);
    font-weight: 700;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-top: 4px;
  }

  /* Category Filter */
  .filter-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 16px 20px 32px;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1.2s;
  }

  .filter-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 18px;
    border-radius: 100px;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--gold-dim);
    color: var(--gold);
    border-color: var(--gold);
  }

  /* Video Grid */
  .grid-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }

  .video-card {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 20px;
    margin-bottom: 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    text-decoration: none;
    color: inherit;
    opacity: 0;
    transform: translateY(20px);
  }

  .video-card.visible {
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.6s ease, transform 0.6s ease, background 0.4s ease, border-color 0.4s ease;
  }

  .video-card:hover {
    background: var(--bg-card-hover);
    border-color: rgba(201,168,76,0.3);
    transform: translateX(4px);
  }

  .card-number {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: rgba(201,168,76,0.25);
    font-weight: 700;
    min-width: 42px;
    text-align: center;
    transition: color 0.3s ease;
  }

  .video-card:hover .card-number {
    color: var(--gold);
  }

  .card-content {
    flex: 1;
    min-width: 0;
  }

  .card-category {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent-blue);
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: 500;
  }

  .card-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-main);
    line-height: 1.5;
    transition: color 0.3s ease;
  }

  .video-card:hover .card-title {
    color: var(--text-bright);
  }

  .card-play {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--gold-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.3s ease;
  }

  .card-play svg {
    width: 16px;
    height: 16px;
    fill: var(--gold);
    margin-left: 2px;
    transition: fill 0.3s ease;
  }

  .video-card:hover .card-play {
    background: var(--gold);
    transform: scale(1.1);
  }

  .video-card:hover .card-play svg {
    fill: var(--bg-deep);
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 40px 20px;
    border-top: 1px solid var(--border);
  }

  .footer-text {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .footer-text .gold { color: var(--gold); }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Search */
  .search-wrap {
    max-width: 400px;
    margin: 0 auto 8px;
    padding: 0 20px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1.1s;
  }

  .search-input {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 12px 20px 12px 44px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-main);
    outline: none;
    transition: border-color 0.3s ease;
  }

  .search-input::placeholder { color: var(--text-dim); }
  .search-input:focus { border-color: var(--gold); }

  .search-wrap { position: relative; }
  .search-icon {
    position: absolute;
    left: 36px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    color: var(--text-dim);
  }

  /* No results */
  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 14px;
    display: none;
  }

  @media (max-width: 600px) {
    .video-card { padding: 16px; gap: 14px; }
    .card-number { font-size: 18px; min-width: 32px; }
    .card-title { font-size: 14px; }
    .card-play { width: 38px; height: 38px; }
    .stats { gap: 24px; }
    .stat-num { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="top-nav">
  <a href="https://www.incruises.com" target="_blank" rel="noopener noreferrer">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    공식 홈페이지 바로가기
  </a>
</div>

<div class="hero">
  <div class="hero-badge">Leadership Academy</div>
  <h1>리더십 <span>아카데미</span></h1>
  <p class="hero-sub">성공하는 리더가 되기 위한 핵심 영상 콘텐츠를 모았습니다.<br>원하는 주제를 선택하고 바로 시청하세요.</p>
  <div class="hero-line"></div>
</div>

<div class="quote-section">
  <div class="quote-text">
    리더는 길을 알고, 그 길을 가며,<br>그 길을 보여주는 사람이다.
  </div>
  <div class="quote-author">— John C. Maxwell</div>
</div>

<div class="cert-notice">
  <div class="cert-badge">
    <svg viewBox="0 0 24 24"><path d="M12 2L9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2z"/></svg>
    <p>백오피스 트레이닝 리더십 아카데미에서<br><strong>수강 완료</strong> 하면 <strong>인증서</strong>도 받으실 수 있습니다.</p>
  </div>
</div>

<div class="stats">
  <div class="stat-item">
    <div class="stat-num">20</div>
    <div class="stat-label">영상 콘텐츠</div>
  </div>
  <div class="stat-item">
    <div class="stat-num">5</div>
    <div class="stat-label">핵심 카테고리</div>
  </div>
  <div class="stat-item">
    <div class="stat-num">∞</div>
    <div class="stat-label">성장 가능성</div>
  </div>
</div>

<div class="search-wrap">
  <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
  </svg>
  <input type="text" class="search-input" placeholder="영상 제목으로 검색..." id="searchInput">
</div>

<div class="filter-bar">
  <button class="filter-btn active" data-cat="all">전체</button>
  <button class="filter-btn" data-cat="mindset">마인드셋</button>
  <button class="filter-btn" data-cat="skill">성공 스킬</button>
  <button class="filter-btn" data-cat="business">비즈니스</button>
  <button class="filter-btn" data-cat="health">건강·웰빙</button>
  <button class="filter-btn" data-cat="brand">브랜드 가치</button>
</div>

<div class="grid-container" id="grid">
</div>

<div class="no-results" id="noResults">
  검색 결과가 없습니다.
</div>

<div class="footer">
  <div class="footer-text">크루즈 멤버십 구독 플랫폼 · <span class="gold">Leadership Academy</span></div>
</div>

<script>
const videos = [
  { title: "집중과 숙달 전술", url: "https://youtu.be/bhSuUJcPfAA?si=PZyLQS4FumRp_ul4", cat: "skill" },
  { title: "회사가 지속 가능한 7가지 이유", url: "https://youtu.be/HfoAHeck46E?si=e8jVVryDC1mnz3ut", cat: "brand" },
  { title: "풍요로운 삶을 위한 안티 규칙 5가지", url: "https://youtu.be/9UvD4-gDaf4?si=w6IqmS-Iw54WYBdh", cat: "mindset" },
  { title: "지금 멈춰야 할 10가지 습관", url: "https://youtu.be/eEpHpYbJRxs?si=xVBEDORui5uQrZZs", cat: "mindset" },
  { title: "연결된 대화를 유지하기 위한 다섯가지 비결", url: "https://youtu.be/7OBy4em4HO4?si=5pMakkbYZCvQQhu_", cat: "skill" },
  { title: "10명 무료등록 성공 공식", url: "https://youtu.be/1UQfMOYW-IA?si=lPGn5zDxBaCKP2K3", cat: "business" },
  { title: "당신의 삶을 더 나은 방향으로 즉시 바꾸는 방법", url: "https://youtu.be/MWr83RW7pIU", cat: "mindset" },
  { title: "가장 성공적인 사람들의 일상적인 개인 습관", url: "https://youtu.be/b_jeL--K95w?si=2dakvaSVn0flTE5V", cat: "skill" },
  { title: "풍요롭게 되기", url: "https://youtu.be/dGK4Ps-CCKI", cat: "mindset" },
  { title: "비방하는 사람들을 상대하는 방법", url: "https://youtu.be/BHyNl_jVZkM?si=7RbsS-5kFcBThv_7", cat: "skill" },
  { title: "문제만 가득한 인생을 멈출 5단계", url: "https://youtu.be/db2sLBLU8j4?si=V7AXuTo1UiAYgBkD", cat: "mindset" },
  { title: "풍요로운 건강 찾기", url: "https://youtu.be/Z2FhuQ8Qb4g?si=v2qdHObS6NhbLbYT", cat: "health" },
  { title: "역경의 시간에 집중하는 방법", url: "https://youtu.be/-OvZB4nLEgE?si=FQ_D4HfWSmWplKDd", cat: "mindset" },
  { title: "당신은 어떤 사업에 종사하십니까?", url: "https://youtu.be/NeKBYsUhkDU?si=HrtUJbsq4BMlmu9I", cat: "business" },
  { title: "당신의 인식의 힘", url: "https://youtu.be/xyi4Xstw91g", cat: "mindset" },
  { title: "플랫폼의 가치", url: "https://youtu.be/O9VS-ozqxE0", cat: "brand" },
  { title: "압도를 제거하는 5가지 비법", url: "https://youtu.be/Ko2exYYnXAI?si=spCg1GObFa1SN5qj", cat: "skill" },
  { title: "자신감 갖기", url: "https://youtu.be/J9RnGe2i1A0?si=ZsKj5r4XBu7m5WWF", cat: "mindset" },
  { title: "격동의 시기를 극복하기 위한 가이드", url: "https://youtu.be/lEN81VsIFTY?si=S-icaRmC9u16eaMt", cat: "skill" },
  { title: "왜 이 이름을 지었을까?", url: "https://youtu.be/KQttNI05shs?si=hHVf0RQ6-J9prPg9", cat: "brand" },
];

const catLabels = {
  mindset: "마인드셋", skill: "성공 스킬", business: "비즈니스", health: "건강·웰빙", brand: "브랜드 가치"
};

const grid = document.getElementById('grid');
const noResults = document.getElementById('noResults');

function renderCards(list) {
  grid.innerHTML = '';
  if (list.length === 0) {
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  list.forEach((v, i) => {
    const card = document.createElement('a');
    card.href = v.url;
    card.target = '_blank';
    card.rel = 'noopener noreferrer';
    card.className = 'video-card';
    card.dataset.cat = v.cat;
    card.innerHTML = `
      <div class="card-number">${String(i + 1).padStart(2, '0')}</div>
      <div class="card-content">
        <div class="card-category">${catLabels[v.cat]}</div>
        <div class="card-title">${v.title}</div>
      </div>
      <div class="card-play">
        <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
      </div>
    `;
    grid.appendChild(card);

    setTimeout(() => card.classList.add('visible'), 80 * i);
  });
}

// Filter
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const cat = btn.dataset.cat;
    const searchVal = document.getElementById('searchInput').value.trim().toLowerCase();
    let filtered = cat === 'all' ? [...videos] : videos.filter(v => v.cat === cat);
    if (searchVal) filtered = filtered.filter(v => v.title.toLowerCase().includes(searchVal));
    renderCards(filtered);
  });
});

// Search
document.getElementById('searchInput').addEventListener('input', (e) => {
  const val = e.target.value.trim().toLowerCase();
  const activeCat = document.querySelector('.filter-btn.active').dataset.cat;
  let filtered = activeCat === 'all' ? [...videos] : videos.filter(v => v.cat === activeCat);
  if (val) filtered = filtered.filter(v => v.title.toLowerCase().includes(val));
  renderCards(filtered);
});

// Initial render
renderCards(videos);
</script>
</body>
</html>
